components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: JWT (7 суток), выдаётся /api/auth/login

  responses:
    Unauthorized:
      description: Не авторизован
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Недостаточно прав / чужой орган
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Не найдено
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    UserMe:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        role: { type: string, enum: [admin, moderator, expert] }
        assigned_spheres:
          type: array
          items: { type: string }
          description: Пусто у admin = без ограничений
        assigned_authorities:
          type: array
          items: { type: string }
          description: user_authorities ∪ коды поддерева user_orgs

    RegistryItem:
      type: object
      description: Карточка требования (ключевые поля из 61 колонки requirement_registry)
      properties:
        id: { type: integer }
        ngr: { type: string }
        npa_title: { type: string }
        article: { type: string, description: «ст.5» / «п. Глава 2 …» }
        norm_url: { type: string, nullable: true, description: "Deep-link adilet #zN" }
        title: { type: string }
        legal_text: { type: string }
        subject: { type: string }
        action: { type: string }
        object: { type: string, nullable: true }
        condition: { type: string, nullable: true }
        evidence: { type: string, nullable: true }
        stages: { type: array, items: { type: string } }
        sphere_code: { type: string }
        ministry: { type: string }
        authority_code: { type: string, nullable: true }
        scope: { type: string, enum: [horizontal, sectoral], nullable: true }
        audience: { type: string, nullable: true }
        is_permit: { type: boolean, nullable: true }
        review_status: { type: string, enum: [pending, confirmed, rejected, edited], nullable: true }
        ara_status: { type: string, nullable: true }
        ara_deadline: { type: string, format: date, nullable: true }
        npa_status: { type: string, nullable: true }
        cost_per_entity_kzt: { type: number, nullable: true }
        total_burden_kzt: { type: number, nullable: true }
      additionalProperties: true

    Submission:
      type: object
      properties:
        id: { type: integer }
        ngr: { type: string }
        npa_title: { type: string }
        org_id: { type: integer }
        sphere_code: { type: string, nullable: true }
        ara_deadline: { type: string, format: date, nullable: true }
        status: { type: string, enum: [submitted, parsing, parsed, error] }
        cards_created: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        processed_at: { type: string, format: date-time, nullable: true }

    Organization:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        parent_id: { type: integer, nullable: true }
        type: { type: string }
        name_ru: { type: string }
        name_kz: { type: string, nullable: true }
        short_name: { type: string, nullable: true }
        region_code: { type: string, nullable: true }
        sphere_codes: { type: array, items: { type: string } }

    CostParams:
      type: object
      description: Параметры Standard Cost Model (одна строка cost_params, id=1)
      properties:
        hours_per_month: { type: number, description: Рабочих часов в месяц (160) }
        on_costs: { type: number, description: Начисления на ФОТ (0.175) }
        overhead: { type: number, description: Накладные (0.30) }
        mult_clerical: { type: number }
        mult_specialist: { type: number }
        mult_manager: { type: number }
        inspector_rate_kzt: { type: number, description: Ставка часа проверки }
        avg_wage_month: { type: number, description: "Фолбэк-зарплата, ₸/мес" }
      additionalProperties: { type: number }
