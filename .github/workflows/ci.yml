name: ci
on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Chunker contract test (Python↔TS fixtures)
        run: npm run test:chunker
      - name: OpenAPI coverage gate (spec ↔ routes)
        run: |
          pip install pyyaml --quiet
          python tests/openapi/check_coverage.py
